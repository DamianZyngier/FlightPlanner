name: Flight Monitor

on:
  schedule:
    # Run 4 times a day: 6am, 12pm, 6pm, 12am UTC
    - cron: '0 6,12,18,0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-flights:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Flight Check
      env:
        KIWI_API_KEY: ${{ secrets.KIWI_API_KEY }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      run: |
        # Ensure data directory exists
        mkdir -p data
        # Run script
        python -m backend.main

    - name: Update Frontend Data
      run: |
        mkdir -p frontend/data
        cp data/flights.json frontend/data/flights.json

    - name: Commit and Push
      run: |
        git config --global user.name 'FlightBot'
        git config --global user.email 'flightbot@users.noreply.github.com'
        git add data/flights.json frontend/data/flights.json
        git commit -m "Update flight data: $(date)" || exit 0
        git push
